name: Monthly Dependencies Bump

on:
  schedule:
    - cron: '0 6 1 * *'  # 06:00 UTC on the 1st day of each month
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  deps-bump:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Get current date
      id: date
      run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

    - name: Update exclude-newer in uv.toml
      run: |
        sed -i "s/exclude-newer = '.*'/exclude-newer = '${{ steps.date.outputs.date }}'/" uv.toml
        cat uv.toml

    - name: Re-lock dependencies
      run: uv lock --upgrade

    - name: Sync all groups
      run: uv sync --all-groups

    - name: Validate with pre-commit (pre-push stage)
      run: uv run pre-commit run --all-files --hook-stage pre-push

    - name: Create branch
      run: |
        BRANCH_NAME="chore/deps-bump-${{ steps.date.outputs.date }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b "$BRANCH_NAME"
        git add uv.toml uv.lock
        git commit -m "chore: bump exclude-newer to ${{ steps.date.outputs.date }}"
        git push -u origin "$BRANCH_NAME"
        echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
      id: create-branch

    - name: Create PR
      run: |
        gh pr create \
          --base main \
          --head ${{ steps.create-branch.outputs.branch }} \
          --title "chore: monthly dependencies bump (${{ steps.date.outputs.date }})" \
          --body "Automated monthly dependencies bump.\n\n- Updated exclude-newer to ${{ steps.date.outputs.date }}\n- Re-locked dependencies with uv lock --upgrade\n- Validated with pre-commit pre-push hooks\n\nPlease review before merging."
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
