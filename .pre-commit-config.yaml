repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Verificaciones no mutadoras (disponibles en pre-commit y pre-push)
      - id: check-yaml
        exclude: ^tests/sandbox/
      - id: check-json
        exclude: ^tests/sandbox/
      - id: check-toml
        exclude: ^tests/sandbox/
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-ast
        exclude: ^tests/sandbox/
      # Hooks mutadores: SOLO pre-commit, excluyen artefactos generados
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: '^(\.agent/runtime/|\.agent/collaboration/|tests/sandbox/|.*\.svg$|\.agent/context/project_map\.md$|\.agent/context/project-map\.json$|\.agent/context/|\.agent/runtime/events/)'
      - id: mixed-line-ending
        stages: [pre-commit]
        args: [--fix=lf]
        exclude: '^(\.agent/runtime/|\.agent/collaboration/|tests/sandbox/|.*\.ps1$|.*\.cmd$|.*\.bat$|\.agent/context/project_map\.md$|\.claude/settings\.json$|\.agent/context/|\.agent/runtime/events/)'
      - id: trailing-whitespace
        stages: [pre-commit]
        args: [--markdown-linebreak-ext=md]
        exclude: '^(\.agent/runtime/|\.agent/collaboration/|tests/sandbox/|\.agent/context/|\.agent/runtime/events/)'

  - repo: local
    hooks:
      # Hook scope protected by scripts/check_ruff_hook_scope.py to prevent non-Python/Markdown drift
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: true
        types: [python]

      # ruff-format es mutador: SOLO pre-commit
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: true
        stages: [pre-commit]
        types: [python]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.3
    hooks:
      - id: uv-lock
        stages: [pre-commit]

  - repo: local
    hooks:
      # Guard against dangerous truncation of execution_log.md without archive compensation
      - id: check-history-truncation
        name: check history truncation guard
        entry: python scripts/check_no_history_truncation.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: check-encoding-guard
        name: check encoding guard
        entry: python scripts/check_encoding_guard.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # pip-audit: auditoria CVE desde uv.lock (todos los grupos).
      # El wrapper exporta uv.lock a requirements.txt temporal y llama pip-audit -r.
      # Garantia: audita la superficie real del proyecto, no el Python del sistema.
      - id: pip-audit
        name: pip-audit (CVE Detection)
        entry: python scripts/pip_audit_project.py
        language: python
        additional_dependencies: [pip-audit]
        pass_filenames: false
        stages: [pre-push, manual]

      # vulture: verificacion no mutadora, solo manual
      - id: vulture
        name: vulture - dead code detection
        entry: uv run vulture bus/ runtime/ scripts/ skills/ tools/ --min-confidence 80 --exclude whitelists,.agent,.cache,.claude,.codex,.opencode,.tmp,.uv-cache,.ruff_cache,tests
        language: system
        types: [python]
        stages: [manual]
