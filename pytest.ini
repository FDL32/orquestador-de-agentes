[pytest]
markers =
    integration: tests that require real filesystem and subprocess execution
    slow: tests that intentionally scan a larger tree or take longer than unit tests
    eval: regression tests for critical orchestration flows (isolated, opt-in)

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -p no:cacheprovider
tmp_path_retention_policy = none
norecursedirs = .runtime .pytest_cache .ruff_cache __pycache__ .agent .tmp tests/sandbox tests/deprecated tests/debug
